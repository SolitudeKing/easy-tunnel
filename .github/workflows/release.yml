name: Publish release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: windows-latest

    env:
      FLET_CLI_NO_RICH_OUTPUT: "1"
      PYTHONUTF8: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync locked dependencies
        run: uv sync --locked

      - name: Verify the release tag matches the package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $version = uv run python -c "from easytunnel import __version__; print(__version__)"
          $expected = "v$version"
          if ($env:RELEASE_TAG -ne $expected) {
            throw "Release tag '$env:RELEASE_TAG' must match '$expected'"
          }

      - name: Run tests
        run: uv run pytest -q

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build release artifacts
        run: powershell -ExecutionPolicy Bypass -File scripts/package_windows.ps1 -OutputDir release -SkipTests

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseFlags = @()
          if ($env:GITHUB_REF_NAME -match "(a|b|rc|\.dev)\d+$") {
            $releaseFlags += "--prerelease"
          }
          $assets = Get-ChildItem -Path "release/python", "release/installer" -File |
            ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME $assets --generate-notes --title "EasyTunnel $env:GITHUB_REF_NAME" @releaseFlags
