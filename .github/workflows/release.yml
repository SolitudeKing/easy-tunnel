name: Publish release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test dependencies
        run: python -m pip install ".[dev]" build

      - name: Verify the release tag matches the package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python -c "from easytunnel import __version__; from os import environ; expected = f'v{__version__}'; actual = environ['RELEASE_TAG']; assert actual == expected, f'Release tag {actual!r} must match {expected!r}'"

      - name: Run tests
        run: python -m pytest -q

      - name: Build distribution packages
        run: python -m build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flags=()
          if [[ "$GITHUB_REF_NAME" =~ (a|b|rc|\.dev)[0-9]+$ ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --title "EasyTunnel $GITHUB_REF_NAME" "${release_flags[@]}"
